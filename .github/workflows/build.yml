name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Общие тесты на JVM ----------
  test-common:
    name: Unit & Integration Tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run tests
        run: ./gradlew :composeApp:desktopTest --stacktrace
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: composeApp/build/reports/tests

  # ---------- Android APK ----------
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Assemble debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weather-android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  # ---------- Desktop / Linux ----------
  build-desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Package Linux distributable (DEB)
        run: ./gradlew :composeApp:packageDeb --stacktrace
      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: weather-linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb

  # ---------- Web (wasmJs) ----------
  build-web:
    name: Build Web (wasmJs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build wasmJs distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace
      - name: Upload web distribution
        uses: actions/upload-artifact@v4
        with:
          name: weather-web-dist
          path: composeApp/build/dist/wasmJs/productionExecutable

  # ---------- iOS ----------
  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
        continue-on-error: true
