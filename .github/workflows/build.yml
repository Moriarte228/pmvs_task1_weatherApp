name: Build & Test All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Unit & Integration tests (common) ─────────────────────────────────────
  test:
    name: Common Tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run common tests
        run: ./gradlew :composeApp:desktopTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: composeApp/build/reports/tests/

  # ─── Android build ──────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  # ─── Desktop (Linux) build ──────────────────────────────────────────────────
  desktop:
    name: Desktop (Linux) Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop JAR
        run: ./gradlew :composeApp:packageReleaseUberJarForCurrentOS --no-daemon

      - name: Upload Desktop JAR
        uses: actions/upload-artifact@v4
        with:
          name: desktop-jar
          path: composeApp/build/compose/jars/*.jar

  # ─── Web (WasmJS) build ─────────────────────────────────────────────────────
  web:
    name: Web (WasmJS) Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Web (WasmJS)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon

      - name: Upload Web distribution
        uses: actions/upload-artifact@v4
        with:
          name: web-distribution
          path: composeApp/build/dist/wasmJs/productionExecutable/

  # ─── iOS build (requires macOS) ─────────────────────────────────────────────
  ios:
    name: iOS Framework Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS framework (simulator)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Upload iOS framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: composeApp/build/bin/iosSimulatorArm64/debugFramework/
